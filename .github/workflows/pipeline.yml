name: CI Gatekeeper Pipeline

on:
  push:
    branches:
      - main
      - dev

jobs:

  linter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install linter
        run: pip install flake8

      - name: Run linter safely
        run: |
          if ls *.py 1> /dev/null 2>&1; then
            flake8 .
          else
            echo "No Python files found. Skipping linting."
          fi

  train:
    runs-on: ubuntu-latest
    needs: linter

    if: |
      github.ref == 'refs/heads/main' &&
      needs.linter.result == 'success' &&
      contains(github.event.head_commit.message, '[run-train]')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run training pipeline
        run: python app.py

      - name: Generate error log
        if: failure()
        run: echo "Training job failed. Check model pipeline." > error_logs.txt

      - name: Upload error logs
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: training-error-logs
          path: error_logs.txt

      - name: Cleanup resources
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."