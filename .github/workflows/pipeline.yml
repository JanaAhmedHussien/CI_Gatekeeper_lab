name: Resource Governed Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # Job 1: The lightweight gatekeeper
  linter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax Check
        run: python -m py_compile app.py

  # Job 2: The expensive training job
  train:
    needs: linter
    runs-on: ubuntu-latest
    # STRICT CONDITIONS: Branch must be main AND commit must have [run-train]
    if: |
      github.ref == 'refs/heads/main' && 
      contains(github.event.head_commit.message, '[run-train]')
    steps:
      - uses: actions/checkout@v4
      - name: Setup Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install scikit-learn
      - name: Execute Model Training
        run: python app.py
        env:
          SIMULATE_FAILURE:"true"

      # UPLOAD ARTIFACT: Only triggers if the training step above fails
      - name: Archive Error Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: model-error-logs
          path: error_logs.txt

  # Job 3: Final cleanup
  cleanup:
    needs: [linter, train]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Post-run Cleanup
        run: echo "Cleaning up temporary cloud volumes..."