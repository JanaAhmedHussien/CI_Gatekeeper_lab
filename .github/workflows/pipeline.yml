name: CI Gatekeeper Pipeline

on:
  push:
    branches:
      - main
      - dev

jobs:

  linter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: pip install flake8

      - name: Run linter
        run: flake8 .

  train:
    runs-on: ubuntu-latest
    needs: linter

    if: |
      github.ref == 'refs/heads/main' &&
      needs.linter.result == 'success' &&
      contains(github.event.head_commit.message, '[run-train]')

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Simulate training job
        run: |
          echo "Running expensive training..."
          sleep 10
          echo "Training done!"

      - name: Generate error log
        if: failure()
        run: echo "Training failed!" > error_logs.txt

      - name: Upload error logs
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: error-logs
          path: error_logs.txt

      - name: Cleanup step
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."

